<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="COYS"/>
  <meta name="theme-color" content="#0a0a0f"/>
  <title>COYS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#0a0a0f;--card:#1a1a24;--card2:#20202e;
      --border:rgba(255,255,255,0.07);
      --accent:#00e5a0;--accent-dim:rgba(0,229,160,0.12);
      --live:#ff3b30;--live-dim:rgba(255,59,48,0.15);
      --spurs:#132257;--spurs-light:#1a3a8a;--spurs-gold:#ffffff;
      --text:#f0f0f5;--muted:#6b6b7a;--subtle:#2a2a38;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100dvh;overscroll-behavior:none}

    /* ── Header ── */
    .hdr{position:sticky;top:0;z-index:100;
      padding:calc(env(safe-area-inset-top) + 10px) 18px 10px;
      background:rgba(10,10,15,.92);
      backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;gap:10px}
    .hdr-left{display:flex;align-items:center;gap:10px}
    .hdr-crest{width:28px;height:28px;object-fit:contain}
    .hdr-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;letter-spacing:.5px;color:var(--text)}
    .hdr-title span{color:var(--accent)}
    .ibtn{width:34px;height:34px;border-radius:50%;background:var(--subtle);border:none;
      color:var(--text);display:flex;align-items:center;justify-content:center;
      cursor:pointer;transition:transform .15s;flex-shrink:0}
    .ibtn:active{transform:scale(.88)}
    .ibtn.spin svg{animation:spin .7s linear}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Nav tabs ── */
    .nav{display:flex;border-bottom:1px solid var(--border);background:rgba(10,10,15,.7)}
    .nvtab{flex:1;padding:11px 4px;border:none;background:transparent;color:var(--muted);
      font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;
      letter-spacing:.8px;text-transform:uppercase;cursor:pointer;transition:all .2s;
      border-bottom:2px solid transparent;margin-bottom:-1px}
    .nvtab.active{color:var(--accent);border-bottom-color:var(--accent)}

    /* ── Pages ── */
    .page{display:none;padding-bottom:calc(env(safe-area-inset-bottom) + 32px)}
    .page.active{display:block}

    /* ── My Club hero ── */
    .club-hero{
      margin:12px;border-radius:20px;overflow:hidden;
      background:linear-gradient(135deg,#0d1b4b 0%,#1a3a8a 60%,#0a0a0f 100%);
      padding:20px;position:relative}
    .club-hero::before{
      content:'';position:absolute;inset:0;
      background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="80" cy="20" r="40" fill="rgba(255,255,255,0.03)"/><circle cx="20" cy="80" r="30" fill="rgba(255,255,255,0.02)"/></svg>');
      background-size:cover}
    .hero-top{display:flex;align-items:center;gap:12px;margin-bottom:16px;position:relative}
    .hero-crest{width:48px;height:48px;object-fit:contain}
    .hero-name{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;
      color:#fff;letter-spacing:.5px;line-height:1}
    .hero-league{font-size:13px;color:rgba(255,255,255,.5);margin-top:2px}
    .change-team{margin-left:auto;padding:6px 12px;background:rgba(255,255,255,.1);
      border:1px solid rgba(255,255,255,.15);border-radius:20px;color:rgba(255,255,255,.7);
      font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:600;
      cursor:pointer;white-space:nowrap}
    .change-team:active{background:rgba(255,255,255,.18)}

    /* Next/last match in hero */
    .hero-match{background:rgba(0,0,0,.3);border-radius:14px;padding:14px;position:relative}
    .hero-match-label{font-size:10px;font-weight:700;letter-spacing:1.5px;
      text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:10px}
    .hero-teams{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .hero-team{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
    .hero-team-crest{width:36px;height:36px;object-fit:contain}
    .hero-team-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;
      color:#fff;text-align:center;line-height:1.2}
    .hero-score-box{display:flex;flex-direction:column;align-items:center;gap:4px}
    .hero-score{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;
      color:#fff;line-height:1;letter-spacing:2px}
    .hero-score.live{color:var(--live)}
    .hero-badge{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
      letter-spacing:.5px;padding:3px 10px;border-radius:20px}
    .hero-badge.live{background:var(--live-dim);color:var(--live);display:flex;align-items:center;gap:4px}
    .hero-badge.live::before{content:'';width:6px;height:6px;border-radius:50%;
      background:var(--live);animation:blink 1.2s ease-in-out infinite}
    .hero-badge.ft{background:rgba(255,255,255,.1);color:rgba(255,255,255,.5)}
    .hero-badge.upcoming{background:var(--accent-dim);color:var(--accent)}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

    .no-match{text-align:center;color:rgba(255,255,255,.35);font-size:14px;padding:8px 0}

    /* ── Section headers ── */
    .slabel{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
      letter-spacing:1.6px;color:var(--muted);text-transform:uppercase;padding:16px 16px 8px}

    /* ── Match cards ── */
    .mcard{margin:0 12px 8px;background:var(--card);border-radius:16px;
      border:1px solid var(--border);padding:13px 14px;
      display:flex;align-items:center;gap:10px;
      position:relative;overflow:hidden;animation:fadeUp .3s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .mcard.live::before{content:'';position:absolute;inset:0;border-radius:16px;
      border:1.5px solid var(--live);opacity:.45;animation:pb 2s ease-in-out infinite;pointer-events:none}
    @keyframes pb{0%,100%{opacity:.45}50%{opacity:.1}}
    .mcard.fav{border-color:rgba(0,229,160,.25)}

    .teams{flex:1;display:flex;flex-direction:column;gap:6px}
    .trow{display:flex;align-items:center;gap:8px}
    .crest{width:18px;height:18px;object-fit:contain;flex-shrink:0}
    .tname{font-size:14px;font-weight:600;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tname.fav{color:var(--accent)}
    .tname.w{font-weight:700} .tname.l{color:var(--muted);font-weight:400}

    .scol{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:26px}
    .sc{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;line-height:1;color:var(--text)}
    .sc.w{color:var(--accent)} .sc.l{color:var(--muted)}
    .sdiv{width:100%;height:1px;background:var(--border)}

    .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;
      font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;
      letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
    .badge.live{background:var(--live-dim);color:var(--live)}
    .badge.live::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--live);animation:blink 1.2s infinite}
    .badge.ft{background:rgba(255,255,255,.07);color:var(--muted)}
    .badge.sch{background:var(--accent-dim);color:var(--accent)}

    /* ── League tabs ── */
    .ltabs{display:flex;gap:6px;padding:10px 12px;overflow-x:auto;scrollbar-width:none}
    .ltabs::-webkit-scrollbar{display:none}
    .ltab{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);
      background:transparent;color:var(--muted);font-family:'Barlow Condensed',sans-serif;
      font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
    .ltab.active{background:var(--accent);border-color:var(--accent);color:#000}

    /* ── News ── */
    .news-card{margin:0 12px 10px;background:var(--card);border-radius:16px;
      border:1px solid var(--border);overflow:hidden;
      display:flex;flex-direction:column;animation:fadeUp .3s ease both;cursor:pointer}
    .news-card:active{background:var(--card2)}
    .news-img{width:100%;height:160px;object-fit:cover;display:block}
    .news-body{padding:12px 14px 14px}
    .news-source{font-size:10px;font-weight:700;letter-spacing:1px;
      text-transform:uppercase;color:var(--accent);margin-bottom:6px}
    .news-title{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;
      color:var(--text);line-height:1.25;margin-bottom:6px}
    .news-desc{font-size:13px;color:var(--muted);line-height:1.5;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .news-time{font-size:11px;color:var(--subtle);margin-top:8px}

    .news-card-sm{margin:0 12px 8px;background:var(--card);border-radius:14px;
      border:1px solid var(--border);padding:12px 14px;
      display:flex;gap:12px;align-items:flex-start;
      animation:fadeUp .3s ease both;cursor:pointer}
    .news-card-sm:active{background:var(--card2)}
    .news-sm-img{width:64px;height:64px;border-radius:10px;object-fit:cover;flex-shrink:0}
    .news-sm-body{flex:1;min-width:0}
    .news-sm-source{font-size:10px;font-weight:700;letter-spacing:1px;
      text-transform:uppercase;color:var(--accent);margin-bottom:4px}
    .news-sm-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;
      color:var(--text);line-height:1.25;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .news-sm-time{font-size:11px;color:var(--subtle);margin-top:4px}

    /* ── States ── */
    .sbox{display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:12px;padding:48px 24px;color:var(--muted);font-size:15px;text-align:center;line-height:1.6}
    .spnr{width:30px;height:30px;border:3px solid var(--subtle);border-top-color:var(--accent);
      border-radius:50%;animation:spin .8s linear infinite}
    .rbtn{padding:9px 22px;background:var(--card);border:1.5px solid var(--border);
      border-radius:12px;color:var(--text);font-family:'Barlow Condensed',sans-serif;
      font-size:15px;font-weight:600;cursor:pointer}
    .rbtn:active{background:var(--card2)}
    .updated{text-align:center;font-size:11px;color:var(--subtle);padding:8px 0 4px}

    /* ── Team picker modal ── */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
      z-index:200;align-items:flex-end;justify-content:center}
    .modal-bg.open{display:flex}
    .modal{background:#16161f;border-radius:24px 24px 0 0;padding:20px 0;
      width:100%;max-height:70vh;overflow-y:auto;
      padding-bottom:calc(env(safe-area-inset-bottom) + 20px)}
    .modal-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;
      padding:0 20px 14px;color:var(--text);letter-spacing:.3px}
    .modal-search{margin:0 16px 12px;padding:10px 14px;background:var(--card);
      border:1.5px solid var(--border);border-radius:12px;color:var(--text);
      font-family:'Barlow',sans-serif;font-size:15px;outline:none;width:calc(100% - 32px)}
    .modal-search::placeholder{color:var(--muted)}
    .modal-search:focus{border-color:var(--accent)}
    .team-opt{display:flex;align-items:center;gap:12px;padding:11px 20px;cursor:pointer;
      transition:background .15s}
    .team-opt:active{background:var(--card)}
    .team-opt-crest{width:26px;height:26px;object-fit:contain}
    .team-opt-name{font-size:15px;font-weight:600;color:var(--text)}
    .team-opt.selected .team-opt-name{color:var(--accent)}
    .modal-cancel{display:block;width:calc(100% - 32px);margin:8px 16px 0;
      padding:13px;background:var(--card);border:none;border-radius:14px;
      color:var(--muted);font-family:'Barlow Condensed',sans-serif;
      font-size:16px;font-weight:600;cursor:pointer}
  </style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <img class="hdr-crest" id="hdrCrest" src="" alt="" onerror="this.style.display='none'"/>
    <div class="hdr-title" id="hdrTitle">Live <span>Scores</span></div>
  </div>
  <button class="ibtn" id="rBtn" onclick="doRefresh()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
    </svg>
  </button>
</div>

<!-- Nav -->
<div class="nav">
  <button class="nvtab active" onclick="showPage('my-club',this)">My Club</button>
  <button class="nvtab"        onclick="showPage('scores',this)">Scores</button>
  <button class="nvtab"        onclick="showPage('news',this)">News</button>
</div>

<!-- My Club page -->
<div class="page active" id="page-my-club">
  <div class="club-hero" id="clubHero">
    <div class="hero-top">
      <img class="hero-crest" id="heroCrest" src="" alt="" onerror="this.style.display='none'"/>
      <div>
        <div class="hero-name" id="heroName">Tottenham</div>
        <div class="hero-league" id="heroLeague">Premier League</div>
      </div>
      <button class="change-team" onclick="openModal()">Change ⌄</button>
    </div>
    <div class="hero-match" id="heroMatch">
      <div class="no-match">Loading match…</div>
    </div>
  </div>
  <div id="clubContent"></div>
</div>

<!-- Scores page -->
<div class="page" id="page-scores">
  <div class="ltabs">
    <button class="ltab active" data-slug="eng.1"                 onclick="swLeague(this)">Premier League</button>
    <button class="ltab"        data-slug="uefa.champions_league" onclick="swLeague(this)">Champions Lg</button>
    <button class="ltab"        data-slug="esp.1"                 onclick="swLeague(this)">La Liga</button>
    <button class="ltab"        data-slug="ger.1"                 onclick="swLeague(this)">Bundesliga</button>
    <button class="ltab"        data-slug="ita.1"                 onclick="swLeague(this)">Serie A</button>
    <button class="ltab"        data-slug="fra.1"                 onclick="swLeague(this)">Ligue 1</button>
  </div>
  <div id="scoresList"></div>
</div>

<!-- News page -->
<div class="page" id="page-news">
  <div id="newsList"><div class="sbox"><div class="spnr"></div><div>Loading news…</div></div></div>
</div>

<!-- Team picker modal -->
<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title">Choose Your Club</div>
    <input class="modal-search" id="modalSearch" placeholder="Search team…" oninput="filterTeams(this.value)"/>
    <div id="teamList"></div>
    <button class="modal-cancel" onclick="closeModalDirect()">Cancel</button>
  </div>
</div>

<script>
// ── Teams ──
var PL_TEAMS = [
  {name:'Arsenal',        espnId:'359',  slug:'eng.1', bbcId:'1006', logo:'https://a.espncdn.com/i/teamlogos/soccer/500/359.png'},
  {name:'Aston Villa',    espnId:'1146', slug:'eng.1', bbcId:'1070', logo:'https://a.espncdn.com/i/teamlogos/soccer/500/1146.png'},

  {name:'Fulham',         espnId:'370',  slug:'eng.1', bbcId:'1011', logo:'https://a.espncdn.com/i/teamlogos/soccer/500/370.png'},
  {name:'Ipswich',        espnId:'373',  slug:'eng.1', bbcId:'1020', logo:'https://a.espncdn.com/i/teamlogos/soccer/500/373.png'},
  {name:'Leicester',      espnId:'375',  slug:'eng.1', bbcId:'1031', logo:'https://a.espncdn.com/i/teamlogos/soccer/500/375.png'},
  {name:'Liverpool',      espnId:'364',  slug:'eng.1', bbcId:'1003', logo:'https://a.espncdn.com/i/teamlogos/soccer/500/364.png'},
  {name:'Man City',       espnId:'382',  slug:'eng.1', bbcId:'1007', logo:'https://a.espncdn.com/i/teamlogos/soccer/500/382.png'},
  {name:'Man United',     espnId:'360',  slug:'eng.1', bbcId:'1001', logo:'https://a.espncdn.com/i/teamlogos/soccer/500/360.png'},
  {name:'Newcastle',      espnId:'361',  slug:'eng.1', bbcId:'1002', logo:'https://a.espncdn.com/i/teamlogos/soccer/500/361.png'},
  {name:'Nottm Forest',   espnId:'393',  slug:'eng.1', bbcId:'1014', logo:'https://a.espncdn.com/i/teamlogos/soccer/500/393.png'},
  {name:'Southampton',    espnId:'398',  slug:'eng.1', bbcId:'1016', logo:'https://a.espncdn.com/i/teamlogos/soccer/500/398.png'},
  {name:'Tottenham',      espnId:'367',  slug:'eng.1', bbcId:'1006', logo:'https://a.espncdn.com/i/teamlogos/soccer/500/367.png'},
  {name:'West Ham',       espnId:'371',  slug:'eng.1', bbcId:'1013', logo:'https://a.espncdn.com/i/teamlogos/soccer/500/371.png'},
  {name:'Wolves',         espnId:'380',  slug:'eng.1', bbcId:'1012', logo:'https://a.espncdn.com/i/teamlogos/soccer/500/380.png'},
];

var leagueSlug = 'eng.1';
var favTeam = JSON.parse(localStorage.getItem('favTeam') || 'null') || PL_TEAMS.find(function(t){return t.name==='Tottenham';});
var refreshTimer;
var currentPage = 'my-club';

// ── Safe fetch (no AbortSignal.timeout - Safari PWA bug) ──
function safeFetch(url, ms) {
  ms = ms || 10000;
  return new Promise(function(resolve, reject) {
    var done = false;
    var t = setTimeout(function() {
      if (!done) { done = true; reject(new Error('Timeout')); }
    }, ms);
    fetch(url).then(function(r) {
      if (!done) { done = true; clearTimeout(t); resolve(r); }
    }).catch(function(e) {
      if (!done) { done = true; clearTimeout(t); reject(e); }
    });
  });
}

function espnScoreboardUrl(slug) {
  var now = new Date();
  var from = new Date(now); from.setDate(now.getDate()-2);
  var to   = new Date(now); to.setDate(now.getDate()+7);
  return 'https://site.api.espn.com/apis/site/v2/sports/soccer/'+slug+'/scoreboard?dates='+fmt(from)+'-'+fmt(to)+'&limit=50';
}

function espnTeamUrl(espnId) {
  return 'https://site.api.espn.com/apis/site/v2/sports/soccer/teams/'+espnId+'/schedule?limit=5';
}

function fmt(d){return d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate());}
function pad(n){return String(n).padStart(2,'0');}

function fetchWithFallback(targetUrl, ms) {
  var encoded = encodeURIComponent(targetUrl);
  var sources = [
    function(){ return safeFetch(targetUrl, ms||10000).then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }); },
    function(){ return safeFetch('https://api.allorigins.win/get?url='+encoded, 14000).then(function(r){ if(!r.ok) throw new Error('allorigins '+r.status); return r.json().then(function(w){return JSON.parse(w.contents);}); }); },
    function(){ return safeFetch('https://corsproxy.io/?'+encoded, 14000).then(function(r){ if(!r.ok) throw new Error('corsproxy '+r.status); return r.json(); }); }
  ];
  return tryEach(sources, 0, []);
}

function tryEach(fns, i, errs) {
  if (i >= fns.length) return Promise.reject(errs.join(' | '));
  return fns[i]().catch(function(e){
    errs.push(String(e.message||e));
    return tryEach(fns, i+1, errs);
  });
}

// ── Pages ──
function showPage(name, el) {
  document.querySelectorAll('.nvtab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  el.classList.add('active');
  document.getElementById('page-'+name).classList.add('active');
  currentPage = name;
  if (name === 'news' && document.getElementById('newsList').querySelector('.spnr')) loadNews();
}

function doRefresh() {
  var b = document.getElementById('rBtn');
  b.classList.add('spin');
  setTimeout(function(){b.classList.remove('spin');},700);
  loadAll();
}

function loadAll() {
  updateHeroUI();
  loadClubMatch();
  loadScores();
  loadNews();
}

// ── My Club ──
function updateHeroUI() {
  document.getElementById('heroCrest').src  = favTeam.logo;
  document.getElementById('heroName').textContent   = favTeam.name;
  document.getElementById('heroLeague').textContent = 'Premier League';
  document.getElementById('hdrCrest').src  = favTeam.logo;
}

function loadClubMatch() {
  document.getElementById('heroMatch').innerHTML = '<div class="no-match">Loading…</div>';
  document.getElementById('clubContent').innerHTML = '';

  fetchWithFallback(espnScoreboardUrl(favTeam.slug || 'eng.1')).then(function(data) {
    var events = data.events || [];
    // Find team's matches
    var teamMatches = events.filter(function(e) {
      var comps = (e.competitions && e.competitions[0] && e.competitions[0].competitors) || [];
      return comps.some(function(c){ return c.team && (c.team.id === favTeam.espnId || c.team.shortDisplayName === favTeam.name || c.team.displayName === favTeam.name); });
    });

    // Find live/next/last
    var liveMatch = teamMatches.find(function(e){
      var s = getStatus(e); return s==='STATUS_IN_PROGRESS'||s==='STATUS_HALFTIME';
    });
    var upcoming = teamMatches.filter(function(e){
      var s=getStatus(e); return s!=='STATUS_FINAL'&&s!=='STATUS_FULL_TIME'&&s!=='STATUS_IN_PROGRESS'&&s!=='STATUS_HALFTIME';
    }).sort(function(a,b){return new Date(a.date)-new Date(b.date);});
    var finished = teamMatches.filter(function(e){
      var s=getStatus(e); return s==='STATUS_FINAL'||s==='STATUS_FULL_TIME';
    }).sort(function(a,b){return new Date(b.date)-new Date(a.date);});

    var featured = liveMatch || upcoming[0] || finished[0];
    if (featured) renderHeroMatch(featured);
    else document.getElementById('heroMatch').innerHTML = '<div class="no-match">No recent matches found</div>';

    // Recent form below hero
    var html = '';
    if (finished.length) {
      html += '<div class="slabel">Recent Results</div>';
      finished.slice(0,5).forEach(function(e,i){ html += matchCard(e,i,true); });
    }
    if (upcoming.length > 1) {
      html += '<div class="slabel">Upcoming Fixtures</div>';
      upcoming.slice(1,6).forEach(function(e,i){ html += matchCard(e,i+10,true); });
    }
    if (html) html += '<div class="updated">via ESPN</div>';
    document.getElementById('clubContent').innerHTML = html || '';

  }).catch(function(e) {
    document.getElementById('heroMatch').innerHTML = '<div class="no-match">Couldn\'t load match data</div>';
    console.error(e);
  });
}

function renderHeroMatch(event) {
  var comp   = event.competitions[0];
  var sname  = getStatus(event);
  var clock  = (comp.status && comp.status.displayClock) || '';
  var isLive = sname === 'STATUS_IN_PROGRESS';
  var isHT   = sname === 'STATUS_HALFTIME';
  var isFT   = sname === 'STATUS_FINAL' || sname === 'STATUS_FULL_TIME';

  var home = comp.competitors.find(function(c){return c.homeAway==='home';})||comp.competitors[0]||{};
  var away = comp.competitors.find(function(c){return c.homeAway==='away';})||comp.competitors[1]||{};
  var hn = (home.team&&(home.team.shortDisplayName||home.team.displayName))||'?';
  var an = (away.team&&(away.team.shortDisplayName||away.team.displayName))||'?';
  var hl = (home.team&&home.team.logo)||'';
  var al = (away.team&&away.team.logo)||'';
  var hs = home.score!=null?home.score:'–';
  var as = away.score!=null?away.score:'–';
  var has = home.score!=null&&away.score!=null;

  var label = isFT ? 'Last Match' : (isLive||isHT) ? 'Live Now' : 'Next Match';

  var badgeHtml = '';
  if (isHT) badgeHtml = '<span class="hero-badge live">HT</span>';
  else if (isLive) badgeHtml = '<span class="hero-badge live">'+(clock||'Live')+'</span>';
  else if (isFT) badgeHtml = '<span class="hero-badge ft">FT</span>';
  else {
    var d = new Date(event.date);
    var dateStr = d.toLocaleDateString([],{weekday:'short',day:'numeric',month:'short'});
    var timeStr = d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    badgeHtml = '<span class="hero-badge upcoming">'+dateStr+' · '+timeStr+'</span>';
  }

  var scoreHtml = has
    ? '<div class="hero-score'+(isLive?' live':'')+'">'+hs+' – '+as+'</div>'
    : '<div class="hero-score" style="font-size:22px;opacity:.5">vs</div>';

  document.getElementById('heroMatch').innerHTML =
    '<div class="hero-match-label">'+label+'</div>'+
    '<div class="hero-teams">'+
      '<div class="hero-team">'+
        (hl?'<img class="hero-team-crest" src="'+hl+'" alt="" onerror="this.style.display=\'none\'"/>':'')+
        '<div class="hero-team-name">'+hn+'</div>'+
      '</div>'+
      '<div class="hero-score-box">'+scoreHtml+badgeHtml+'</div>'+
      '<div class="hero-team">'+
        (al?'<img class="hero-team-crest" src="'+al+'" alt="" onerror="this.style.display=\'none\'"/>':'')+
        '<div class="hero-team-name">'+an+'</div>'+
      '</div>'+
    '</div>';
}

// ── Scores ──
function swLeague(el) {
  document.querySelectorAll('.ltab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  leagueSlug = el.dataset.slug;
  loadScores();
}

function loadScores() {
  var list = document.getElementById('scoresList');
  list.innerHTML = '<div class="sbox"><div class="spnr"></div><div>Loading…</div></div>';

  fetchWithFallback(espnScoreboardUrl(leagueSlug)).then(function(data){
    renderScores(data.events||[], list);
  }).catch(function(){
    list.innerHTML = '<div class="sbox"><div style="font-size:36px">⚠️</div><div>Couldn\'t load scores</div><button class="rbtn" onclick="loadScores()">Retry</button></div>';
  });
}

function renderScores(events, container) {
  if (!events.length) {
    container.innerHTML = '<div class="sbox"><div style="font-size:36px">📅</div><div>No matches this week</div></div>';
    return;
  }
  var live=[], done=[], soon=[];
  events.forEach(function(e){
    var s=getStatus(e);
    if(s==='STATUS_IN_PROGRESS'||s==='STATUS_HALFTIME') live.push(e);
    else if(s==='STATUS_FINAL'||s==='STATUS_FULL_TIME') done.push(e);
    else soon.push(e);
  });
  soon.sort(function(a,b){return new Date(a.date)-new Date(b.date);});
  done.sort(function(a,b){return new Date(b.date)-new Date(a.date);});

  var html='';
  if(live.length) html+=sec('🔴 Live Now',live,0);
  if(done.length) html+=sec('Results',done,live.length);
  if(soon.length) html+=sec('Upcoming',soon.slice(0,10),live.length+done.length);
  html+='<div class="updated">'+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+' · ESPN</div>';
  container.innerHTML=html;
}

function sec(label,arr,offset){
  return '<div class="slabel">'+label+'</div>'+arr.map(function(e,i){return matchCard(e,i+offset,false);}).join('');
}

function matchCard(event, idx, highlightFav) {
  var comp  = event.competitions&&event.competitions[0];
  var sname = getStatus(event);
  var clock = (comp&&comp.status&&comp.status.displayClock)||'';
  var isLive= sname==='STATUS_IN_PROGRESS';
  var isHT  = sname==='STATUS_HALFTIME';
  var isFT  = sname==='STATUS_FINAL'||sname==='STATUS_FULL_TIME';

  var competitors=(comp&&comp.competitors)||[];
  var home=competitors.find(function(c){return c.homeAway==='home';})||competitors[0]||{};
  var away=competitors.find(function(c){return c.homeAway==='away';})||competitors[1]||{};

  var hn=(home.team&&(home.team.shortDisplayName||home.team.displayName))||'?';
  var an=(away.team&&(away.team.shortDisplayName||away.team.displayName))||'?';
  var hl=(home.team&&home.team.logo)||'';
  var al=(away.team&&away.team.logo)||'';
  var hs=home.score!=null?home.score:null;
  var as=away.score!=null?away.score:null;
  var has=hs!==null&&as!==null;

  var isFavHome = highlightFav && home.team && (home.team.id===favTeam.espnId||hn===favTeam.name||(home.team.displayName&&home.team.displayName.indexOf(favTeam.name)>=0));
  var isFavAway = highlightFav && away.team && (away.team.id===favTeam.espnId||an===favTeam.name||(away.team.displayName&&away.team.displayName.indexOf(favTeam.name)>=0));
  var isFavMatch= isFavHome||isFavAway;

  var hc='',ac='',hsc='',asc='';
  if(isFT&&has){
    var h=parseInt(hs),a=parseInt(as);
    if(h>a){hc='w';ac='l';hsc='w';asc='l';}
    else if(a>h){hc='l';ac='w';hsc='l';asc='w';}
  }
  if(isFavHome) hc+=(hc?' ':'')+' fav';
  if(isFavAway) ac+=(ac?' ':'')+' fav';

  var badge='';
  if(isHT) badge='<div class="badge live">HT</div>';
  else if(isLive) badge='<div class="badge live">'+(clock||'Live')+'</div>';
  else if(isFT) badge='<div class="badge ft">FT</div>';
  else{
    var d=new Date(event.date);
    var now=new Date();
    var isToday=d.toDateString()===now.toDateString();
    var isTomorrow=d.toDateString()===new Date(now.getTime()+86400000).toDateString();
    var time=d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    var prefix=isToday?'':isTomorrow?'Tomorrow ':d.toLocaleDateString([],{weekday:'short',day:'numeric',month:'short'})+' ';
    badge='<div class="badge sch">'+prefix+time+'</div>';
  }

  var hImg=hl?'<img class="crest" src="'+hl+'" alt="" onerror="this.style.display=\'none\'"/>':'';
  var aImg=al?'<img class="crest" src="'+al+'" alt="" onerror="this.style.display=\'none\'"/>':'';

  return '<div class="mcard'+(isLive||isHT?' live':'')+(isFavMatch?' fav':'')+'" style="animation-delay:'+(idx*0.04)+'s">'+
    '<div class="teams">'+
      '<div class="trow">'+hImg+'<div class="tname '+hc.trim()+'">'+hn+'</div></div>'+
      '<div class="trow">'+aImg+'<div class="tname '+ac.trim()+'">'+an+'</div></div>'+
    '</div>'+
    '<div class="scol">'+
      '<div class="sc '+hsc+'">'+(has?hs:'–')+'</div>'+
      '<div class="sdiv"></div>'+
      '<div class="sc '+asc+'">'+(has?as:'–')+'</div>'+
    '</div>'+
    '<div style="min-width:70px;display:flex;justify-content:flex-end">'+badge+'</div>'+
  '</div>';
}

function getStatus(event){
  return ((event.competitions&&event.competitions[0]&&event.competitions[0].status&&event.competitions[0].status.type&&event.competitions[0].status.type.name)||'');
}

// ── News ──
function loadNews() {
  var list = document.getElementById('newsList');
  list.innerHTML = '<div class="sbox"><div class="spnr"></div><div>Loading news…</div></div>';

  // BBC Sport RSS for Tottenham - via proxy
  var rssUrl = 'https://feeds.bbci.co.uk/sport/football/teams/tottenham-hotspur/rss.xml';
  var encoded = encodeURIComponent(rssUrl);

  var sources = [
    function(){ return safeFetch('https://api.allorigins.win/get?url='+encoded,14000).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json().then(function(w){return w.contents;});}); },
    function(){ return safeFetch('https://corsproxy.io/?'+encoded,14000).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.text();}); }
  ];

  tryEach(sources, 0, []).then(function(xml) {
    var items = parseRSS(xml);
    if (!items.length) throw new Error('empty');
    renderNews(items, list);
  }).catch(function(e) {
    // Fallback: show Google News RSS for Spurs
    var fallback = encodeURIComponent('https://news.google.com/rss/search?q=Tottenham+Hotspur&hl=en-GB&gl=GB&ceid=GB:en');
    tryEach([
      function(){ return safeFetch('https://api.allorigins.win/get?url='+fallback,14000).then(function(r){return r.json().then(function(w){return w.contents;});}); },
      function(){ return safeFetch('https://corsproxy.io/?'+fallback,14000).then(function(r){return r.text();}); }
    ], 0, []).then(function(xml){
      var items = parseRSS(xml);
      renderNews(items, list);
    }).catch(function(){
      list.innerHTML = '<div class="sbox"><div style="font-size:36px">📰</div><div>Couldn\'t load news.<br><small>Check your connection</small></div><button class="rbtn" onclick="loadNews()">Retry</button></div>';
    });
  });
}

function parseRSS(xml) {
  var parser = new DOMParser();
  var doc = parser.parseFromString(xml, 'text/xml');
  var items = Array.from(doc.querySelectorAll('item'));
  return items.slice(0,15).map(function(item) {
    var title   = (item.querySelector('title')||{}).textContent||'';
    var link    = (item.querySelector('link')||{}).textContent||(item.querySelector('guid')||{}).textContent||'#';
    var desc    = (item.querySelector('description')||{}).textContent||'';
    var pubDate = (item.querySelector('pubDate')||{}).textContent||'';
    var source  = (item.querySelector('source')||{}).textContent||'BBC Sport';

    // Strip HTML from description
    var tmp = document.createElement('div');
    tmp.innerHTML = desc;
    var cleanDesc = tmp.textContent||tmp.innerText||'';

    // Try to find image in media:content or enclosure or description img
    var img = '';
    var media = item.querySelector('content') || item.querySelector('thumbnail') || item.querySelector('enclosure');
    if (media) img = media.getAttribute('url')||'';
    if (!img) {
      var imgMatch = desc.match(/src="([^"]+)"/);
      if (imgMatch) img = imgMatch[1];
    }

    var time = '';
    if (pubDate) {
      var d = new Date(pubDate);
      var now = new Date();
      var diff = Math.floor((now - d) / 60000);
      if (diff < 60) time = diff+'m ago';
      else if (diff < 1440) time = Math.floor(diff/60)+'h ago';
      else time = Math.floor(diff/1440)+'d ago';
    }

    return { title:title.trim(), link:link.trim(), desc:cleanDesc.trim(), img:img, time:time, source:source };
  }).filter(function(i){ return i.title; });
}

function renderNews(items, container) {
  if (!items.length) {
    container.innerHTML = '<div class="sbox"><div style="font-size:36px">📰</div><div>No news found</div></div>';
    return;
  }

  var html = '<div class="slabel">'+favTeam.name+' News</div>';

  // First item big
  var first = items[0];
  html += '<div class="news-card" onclick="openLink(\''+escUrl(first.link)+'\')" style="animation-delay:0s">';
  if (first.img) html += '<img class="news-img" src="'+first.img+'" alt="" onerror="this.parentNode.removeChild(this)"/>';
  html += '<div class="news-body"><div class="news-source">'+esc(first.source)+'</div><div class="news-title">'+esc(first.title)+'</div>';
  if (first.desc) html += '<div class="news-desc">'+esc(first.desc)+'</div>';
  html += '<div class="news-time">'+first.time+'</div></div></div>';

  // Rest small
  items.slice(1).forEach(function(item, i) {
    html += '<div class="news-card-sm" onclick="openLink(\''+escUrl(item.link)+'\')" style="animation-delay:'+(i*0.04+0.05)+'s">';
    if (item.img) html += '<img class="news-sm-img" src="'+item.img+'" alt="" onerror="this.style.display=\'none\'"/>';
    html += '<div class="news-sm-body"><div class="news-sm-source">'+esc(item.source)+'</div><div class="news-sm-title">'+esc(item.title)+'</div><div class="news-sm-time">'+item.time+'</div></div></div>';
  });

  html += '<div class="updated">'+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+'</div>';
  container.innerHTML = html;
}

function openLink(url) { window.open(url, '_blank'); }
function esc(s){ var d=document.createElement('div');d.textContent=s;return d.innerHTML; }
function escUrl(s){ return s.replace(/'/g,'%27'); }

// ── Team Picker ──
function openModal() {
  renderTeamList('');
  document.getElementById('modalBg').classList.add('open');
  document.getElementById('modalSearch').value='';
  document.getElementById('modalSearch').focus();
}
function closeModal(e){ if(e.target===document.getElementById('modalBg')) closeModalDirect(); }
function closeModalDirect(){ document.getElementById('modalBg').classList.remove('open'); }

function filterTeams(q) { renderTeamList(q.toLowerCase()); }

function renderTeamList(q) {
  var teams = PL_TEAMS.filter(function(t){ return !q||t.name.toLowerCase().indexOf(q)>=0; });
  var html = teams.map(function(t){
    var sel = t.name===favTeam.name?' selected':'';
    return '<div class="team-opt'+sel+'" onclick="selectTeam(\''+t.name+'\')">'+
      '<img class="team-opt-crest" src="'+t.logo+'" alt="" onerror="this.style.display=\'none\'"/>'+
      '<div class="team-opt-name">'+t.name+'</div>'+
    '</div>';
  }).join('');
  document.getElementById('teamList').innerHTML = html;
}

function selectTeam(name) {
  favTeam = PL_TEAMS.find(function(t){return t.name===name;});
  localStorage.setItem('favTeam', JSON.stringify(favTeam));
  closeModalDirect();
  loadAll();
  // Reload news for new team
  document.getElementById('newsList').innerHTML = '<div class="sbox"><div class="spnr"></div><div>Loading news…</div></div>';
  loadNews();
}

loadClubMatch();
loadScores();
// Lazy load news
setTimeout(loadNews, 500);
refreshTimer = setInterval(function(){
  loadClubMatch();
  if(currentPage==='scores') loadScores();
  if(currentPage==='news') loadNews();
}, 60000);
