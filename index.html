<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Scores"/>
  <meta name="theme-color" content="#0a0a0f"/>
  <title>Live Scores</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#0a0a0f;--card:#1a1a24;--card2:#20202e;
      --border:rgba(255,255,255,0.07);--accent:#00e5a0;
      --accent-dim:rgba(0,229,160,0.12);--live:#ff3b30;
      --live-dim:rgba(255,59,48,0.15);--text:#f0f0f5;
      --muted:#6b6b7a;--subtle:#2a2a38;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100dvh;overscroll-behavior:none}
 
    /* ── Header ── */
    .hdr{position:sticky;top:0;z-index:100;
      padding:calc(env(safe-area-inset-top) + 12px) 20px 14px;
      background:rgba(10,10,15,.9);
      backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between}
    .hdr-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.5px}
    .hdr-title span{color:var(--accent)}
    .ibtn{width:36px;height:36px;border-radius:50%;background:var(--subtle);border:none;
      color:var(--text);display:flex;align-items:center;justify-content:center;
      cursor:pointer;transition:transform .15s;flex-shrink:0}
    .ibtn:active{transform:scale(.88)}
    .ibtn.spin svg{animation:spin .7s linear}
    @keyframes spin{to{transform:rotate(360deg)}}
 
    /* ── Tabs ── */
    .tabs{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;scrollbar-width:none}
    .tabs::-webkit-scrollbar{display:none}
    .tab{flex-shrink:0;padding:7px 16px;border-radius:20px;
      border:1.5px solid var(--border);background:transparent;color:var(--muted);
      font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;
      cursor:pointer;transition:all .2s;white-space:nowrap}
    .tab.active{background:var(--accent);border-color:var(--accent);color:#000}
 
    /* ── Match list ── */
    .content{padding:4px 0 calc(env(safe-area-inset-bottom) + 32px)}
    .slabel{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
      letter-spacing:1.6px;color:var(--muted);text-transform:uppercase;padding:16px 20px 8px}
 
    .mcard{margin:0 12px 8px;background:var(--card);border-radius:16px;
      border:1px solid var(--border);padding:14px 16px;
      display:flex;align-items:center;gap:12px;
      position:relative;overflow:hidden;animation:fadeUp .3s ease both;
      cursor:pointer;transition:background .15s}
    .mcard:active{background:var(--card2)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .mcard.live::before{content:'';position:absolute;inset:0;border-radius:16px;
      border:1.5px solid var(--live);opacity:.45;animation:pb 2s ease-in-out infinite;pointer-events:none}
    @keyframes pb{0%,100%{opacity:.45}50%{opacity:.1}}
 
    .teams{flex:1;display:flex;flex-direction:column;gap:7px}
    .trow{display:flex;align-items:center;gap:10px}
    .crest{width:20px;height:20px;object-fit:contain;flex-shrink:0}
    .tname{font-size:15px;font-weight:600;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tname.w{color:var(--text)} .tname.l{color:var(--muted);font-weight:400}
 
    .scol{display:flex;flex-direction:column;align-items:center;gap:5px;min-width:28px}
    .sc{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;line-height:1;color:var(--text)}
    .sc.w{color:var(--accent)} .sc.l{color:var(--muted)}
    .sdiv{width:100%;height:1px;background:var(--border)}
 
    .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;
      font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
      letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
    .badge.live{background:var(--live-dim);color:var(--live)}
    .badge.live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--live);animation:blink 1.2s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    .badge.ft{background:rgba(255,255,255,.07);color:var(--muted)}
    .badge.sch{background:var(--accent-dim);color:var(--accent)}
 
    /* lineup available indicator */
    .lineup-pip{width:7px;height:7px;border-radius:50%;background:var(--accent);
      position:absolute;top:10px;right:10px;opacity:.8}
 
    /* ── States ── */
    .sbox{display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:12px;padding:48px 24px;color:var(--muted);font-size:15px;text-align:center;line-height:1.6}
    .spnr{width:32px;height:32px;border:3px solid var(--subtle);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    .rbtn{padding:10px 24px;background:var(--card);border:1.5px solid var(--border);
      border-radius:12px;color:var(--text);font-family:'Barlow Condensed',sans-serif;
      font-size:16px;font-weight:600;cursor:pointer}
    .rbtn:active{background:var(--card2)}
    .updated{text-align:center;font-size:12px;color:var(--muted);padding:8px 0 4px}
    .source-tag{font-size:11px;color:var(--subtle);text-align:center;padding-bottom:16px}
    #dbg{display:none;margin:0 12px 12px;padding:12px 14px;background:rgba(255,59,48,.08);
      border:1px solid rgba(255,59,48,.2);border-radius:12px;
      font-size:12px;color:#ff9f9f;line-height:1.7;font-family:monospace;word-break:break-all}
 
    /* ── Lineup Sheet ── */
    .sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;
      opacity:0;transition:opacity .25s;pointer-events:none}
    .sheet-backdrop.open{opacity:1;pointer-events:all}
 
    .sheet{position:fixed;bottom:0;left:0;right:0;z-index:201;
      background:#13131a;border-radius:24px 24px 0 0;
      padding:0 0 calc(env(safe-area-inset-bottom) + 16px);
      transform:translateY(100%);transition:transform .32s cubic-bezier(.32,1,.23,1);
      max-height:90dvh;display:flex;flex-direction:column}
    .sheet.open{transform:translateY(0)}
 
    .sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--subtle);
      margin:12px auto 0}
 
    .sheet-hdr{display:flex;align-items:center;justify-content:space-between;
      padding:16px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
    .sheet-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800}
    .sheet-close{background:none;border:none;color:var(--muted);font-size:22px;
      cursor:pointer;padding:0 4px;line-height:1}
 
    .sheet-body{overflow-y:auto;flex:1;padding:0 16px 16px;-webkit-overflow-scrolling:touch}
 
    /* match summary inside sheet */
    .sheet-match{display:flex;align-items:center;justify-content:center;gap:16px;
      padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:4px}
    .sheet-team{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
    .sheet-crest{width:36px;height:36px;object-fit:contain}
    .sheet-team-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;
      text-align:center;letter-spacing:.2px}
    .sheet-score{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:800;
      letter-spacing:2px;color:var(--accent)}
    .sheet-score.pending{color:var(--muted);font-size:22px;letter-spacing:4px}
 
    /* lineup columns */
    .lineup-cols{display:flex;gap:0;margin-top:8px}
    .lineup-col{flex:1;padding:0 4px}
    .lineup-col-title{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;
      letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);
      padding:10px 0 8px;text-align:center;border-bottom:1px solid var(--border);margin-bottom:2px}
 
    .player-row{display:flex;align-items:center;gap:8px;padding:7px 4px;
      border-bottom:1px solid rgba(255,255,255,.04)}
    .player-num{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;
      color:var(--muted);width:20px;text-align:right;flex-shrink:0}
    .player-name{font-size:13px;font-weight:500;color:var(--text);flex:1;line-height:1.3}
    .player-pos{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
      color:var(--muted);letter-spacing:.5px}
 
    .captain-badge{display:inline-block;font-size:9px;font-weight:700;
      background:rgba(255,200,0,.15);color:#ffc800;border-radius:4px;
      padding:1px 4px;margin-left:4px;letter-spacing:.5px;vertical-align:middle}
 
    .subs-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
      letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);
      padding:12px 4px 6px;display:block}
 
    .no-lineup{text-align:center;padding:32px 16px;color:var(--muted);font-size:14px;line-height:1.7}
    .no-lineup .big{font-size:36px;display:block;margin-bottom:8px}
 
    .formation-tag{text-align:center;font-family:'Barlow Condensed',sans-serif;
      font-size:13px;font-weight:600;color:var(--muted);letter-spacing:.5px;padding:6px 0 0}
  </style>
</head>
<body>
 
<div class="hdr">
  <div class="hdr-title">Live <span>Scores</span></div>
  <button class="ibtn" id="rBtn" onclick="doRefresh()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
    </svg>
  </button>
</div>
 
<div class="tabs">
  <button class="tab active" data-slug="eng.1"                 onclick="sw(this)">Premier League</button>
  <button class="tab"        data-slug="uefa.champions_league" onclick="sw(this)">Champions Lg</button>
  <button class="tab"        data-slug="esp.1"                 onclick="sw(this)">La Liga</button>
  <button class="tab"        data-slug="ger.1"                 onclick="sw(this)">Bundesliga</button>
  <button class="tab"        data-slug="ita.1"                 onclick="sw(this)">Serie A</button>
  <button class="tab"        data-slug="fra.1"                 onclick="sw(this)">Ligue 1</button>
</div>
 
<div class="content" id="list"></div>
<div id="dbg"></div>
 
<!-- Lineup sheet -->
<div class="sheet-backdrop" id="backdrop" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-hdr">
    <div class="sheet-title" id="sheet-title">Lineup</div>
    <button class="sheet-close" onclick="closeSheet()">✕</button>
  </div>
  <div class="sheet-body" id="sheet-body"></div>
</div>
 
<script>
  var slug = 'eng.1', timer, lastSource = '', allEvents = [];
 
  // ── Fetch helpers ──────────────────────────────────────────────
 
  function safeFetch(url, ms) {
    ms = ms || 10000;
    return new Promise(function(resolve, reject) {
      var done = false;
      var t = setTimeout(function() {
        if (!done) { done = true; reject(new Error('Timeout')); }
      }, ms);
      fetch(url).then(function(r) {
        if (!done) { done = true; clearTimeout(t); resolve(r); }
      }).catch(function(e) {
        if (!done) { done = true; clearTimeout(t); reject(e); }
      });
    });
  }
 
  function espnUrl(s) {
    var r = dateRange();
    return 'https://site.api.espn.com/apis/site/v2/sports/soccer/' + s +
      '/scoreboard?dates=' + r.from + '-' + r.to + '&limit=50';
  }
 
  // Detailed event URL — includes roster/lineup data
  function espnEventUrl(eventId) {
    return 'https://site.api.espn.com/apis/site/v2/sports/soccer/' + slug + '/summary?event=' + eventId;
  }
 
  var STRATEGIES = [
    {
      name: 'ESPN direct',
      fn: function(url) {
        return safeFetch(url).then(function(r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        });
      }
    },
    {
      name: 'allorigins proxy',
      fn: function(url) {
        return safeFetch('https://api.allorigins.win/get?url=' + encodeURIComponent(url), 14000).then(function(r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json().then(function(w) { return JSON.parse(w.contents); });
        });
      }
    },
    {
      name: 'corsproxy.io',
      fn: function(url) {
        return safeFetch('https://corsproxy.io/?' + encodeURIComponent(url), 14000).then(function(r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        });
      }
    }
  ];
 
  function fetchWithFallback(url) {
    return new Promise(function(resolve, reject) {
      var errors = [];
      function tryNext(idx) {
        if (idx >= STRATEGIES.length) { reject(errors); return; }
        STRATEGIES[idx].fn(url).then(function(data) {
          lastSource = STRATEGIES[idx].name;
          resolve(data);
        }).catch(function(e) {
          errors.push(STRATEGIES[idx].name + ': ' + e.message);
          tryNext(idx + 1);
        });
      }
      tryNext(0);
    });
  }
 
  // ── Date helpers ───────────────────────────────────────────────
 
  function dateRange() {
    var now = new Date();
    var from = new Date(now); from.setDate(now.getDate() - 1);
    var to   = new Date(now); to.setDate(now.getDate() + 6);
    return { from: fmtD(from), to: fmtD(to) };
  }
  function fmtD(d) { return d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()); }
  function pad(n)  { return String(n).padStart(2,'0'); }
 
  // ── UI ─────────────────────────────────────────────────────────
 
  function sw(el) {
    document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
    el.classList.add('active');
    slug = el.dataset.slug;
    load();
  }
 
  function doRefresh() {
    var b = document.getElementById('rBtn');
    b.classList.add('spin');
    setTimeout(function(){ b.classList.remove('spin'); }, 700);
    load();
  }
 
  function load() {
    var list = document.getElementById('list');
    var dbg  = document.getElementById('dbg');
    list.innerHTML = '<div class="sbox"><div class="spnr"></div><div>Loading scores…</div></div>';
    dbg.style.display = 'none';
 
    fetchWithFallback(espnUrl(slug)).then(function(data) {
      allEvents = data.events || [];
      render(allEvents, list);
    }).catch(function(errors) {
      list.innerHTML = '<div class="sbox">' +
        '<div style="font-size:40px">⚠️</div>' +
        '<div>Couldn\'t load scores.</div>' +
        '<button class="rbtn" onclick="load()">Try Again</button>' +
        '<button class="rbtn" onclick="showDbg()" style="font-size:13px;opacity:.6;margin-top:-4px">Show details</button>' +
        '</div>';
      dbg.innerHTML = errors.join('<br>');
    });
  }
 
  function showDbg() { document.getElementById('dbg').style.display = 'block'; }
 
  // ── Render matches ─────────────────────────────────────────────
 
  function render(events, container) {
    if (!events.length) {
      container.innerHTML = '<div class="sbox"><div style="font-size:40px">📅</div><div>No matches this week</div></div>';
      return;
    }
 
    var live=[], done=[], soon=[];
    events.forEach(function(e) {
      var s = getStatus(e);
      if (s === 'live') live.push(e);
      else if (s === 'ft') done.push(e);
      else soon.push(e);
    });
 
    soon.sort(function(a,b){ return new Date(a.date) - new Date(b.date); });
    done.sort(function(a,b){ return new Date(b.date) - new Date(a.date); });
 
    var html = '';
    if (live.length) html += sec('🔴 Live Now', live, 0);
    if (done.length) html += sec('Results', done, live.length);
    if (soon.length) html += sec('Upcoming', soon.slice(0,10), live.length+done.length);
 
    var t = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    html += '<div class="updated">Updated ' + t + '</div>';
    html += '<div class="source-tag">via ' + lastSource + ' · tap a match for lineup</div>';
    container.innerHTML = html;
  }
 
  function getStatus(e) {
    var s = (e.competitions && e.competitions[0] && e.competitions[0].status &&
             e.competitions[0].status.type && e.competitions[0].status.type.name) || '';
    if (s === 'STATUS_IN_PROGRESS' || s === 'STATUS_HALFTIME') return 'live';
    if (s === 'STATUS_FINAL' || s === 'STATUS_FULL_TIME') return 'ft';
    return 'soon';
  }
 
  function hasLineup(e) {
    var comp = e.competitions && e.competitions[0];
    if (!comp) return false;
    // ESPN sets rosters array when lineups are confirmed
    return !!(comp.rosters && comp.rosters.length > 0);
  }
 
  function sec(label, arr, offset) {
    return '<div class="slabel">' + label + '</div>' +
      arr.map(function(e,i){ return card(e, i+offset); }).join('');
  }
 
  function card(event, idx) {
    var comp  = event.competitions && event.competitions[0];
    var sname = (comp && comp.status && comp.status.type && comp.status.type.name) || '';
    var clock = (comp && comp.status && comp.status.displayClock) || '';
    var status = getStatus(event);
    var isLive = status === 'live';
    var isFT   = status === 'ft';
    var lineupReady = hasLineup(event);
 
    var competitors = (comp && comp.competitors) || [];
    var home = competitors.find(function(c){ return c.homeAway === 'home'; }) || competitors[0] || {};
    var away = competitors.find(function(c){ return c.homeAway === 'away'; }) || competitors[1] || {};
 
    var hn  = (home.team && (home.team.shortDisplayName || home.team.displayName)) || '?';
    var an  = (away.team && (away.team.shortDisplayName || away.team.displayName)) || '?';
    var hl  = (home.team && home.team.logo) || '';
    var al  = (away.team && away.team.logo) || '';
    var hs  = home.score != null ? home.score : null;
    var as  = away.score != null ? away.score : null;
    var has = hs !== null && as !== null;
 
    var hc='', ac='', hsc='', asc='';
    if (isFT && has) {
      var hv=parseInt(hs), av=parseInt(as);
      if(hv>av){hc='w';ac='l';hsc='w';asc='l';}
      else if(av>hv){hc='l';ac='w';hsc='l';asc='w';}
    }
 
    var badge='';
    if (sname === 'STATUS_HALFTIME') {
      badge = '<div class="badge live">HT</div>';
    } else if (isLive) {
      badge = '<div class="badge live">' + (clock||'Live') + '</div>';
    } else if (isFT) {
      badge = '<div class="badge ft">FT</div>';
    } else {
      var d = new Date(event.date);
      var now = new Date();
      var isToday    = d.toDateString() === now.toDateString();
      var isTomorrow = d.toDateString() === new Date(now.getTime()+86400000).toDateString();
      var time = d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      var prefix = isToday ? '' : isTomorrow ? 'Tomorrow ' :
        d.toLocaleDateString([],{weekday:'short',day:'numeric',month:'short'}) + ' ';
      badge = '<div class="badge sch">' + prefix + time + '</div>';
    }
 
    var hImg = hl ? '<img class="crest" src="'+hl+'" alt="" onerror="this.style.display=\'none\'"/>' : '';
    var aImg = al ? '<img class="crest" src="'+al+'" alt="" onerror="this.style.display=\'none\'"/>' : '';
    var pip  = lineupReady ? '<div class="lineup-pip" title="Lineup confirmed"></div>' : '';
 
    return '<div class="mcard' + (isLive?' live':'') + '" ' +
      'style="animation-delay:' + (idx*0.04) + 's" ' +
      'onclick="openLineup(\'' + event.id + '\')">' +
      pip +
      '<div class="teams">' +
        '<div class="trow">' + hImg + '<div class="tname '+hc+'">' + hn + '</div></div>' +
        '<div class="trow">' + aImg + '<div class="tname '+ac+'">' + an + '</div></div>' +
      '</div>' +
      '<div class="scol">' +
        '<div class="sc '+hsc+'">' + (has?hs:'–') + '</div>' +
        '<div class="sdiv"></div>' +
        '<div class="sc '+asc+'">' + (has?as:'–') + '</div>' +
      '</div>' +
      '<div style="min-width:72px;display:flex;justify-content:flex-end;align-items:center">' + badge + '</div>' +
    '</div>';
  }
 
  // ── Lineup sheet ───────────────────────────────────────────────
 
  function openLineup(eventId) {
    var event = allEvents.find(function(e){ return e.id === eventId; });
    if (!event) return;
 
    var comp = event.competitions && event.competitions[0];
    var home = (comp && comp.competitors && comp.competitors.find(function(c){ return c.homeAway==='home'; })) || {};
    var away = (comp && comp.competitors && comp.competitors.find(function(c){ return c.homeAway==='away'; })) || {};
 
    var hn = (home.team && (home.team.shortDisplayName || home.team.displayName)) || '?';
    var an = (away.team && (away.team.shortDisplayName || away.team.displayName)) || '?';
    var hl = (home.team && home.team.logo) || '';
    var al = (away.team && away.team.logo) || '';
    var hs = home.score != null ? home.score : null;
    var as = away.score != null ? away.score : null;
 
    document.getElementById('sheet-title').textContent = hn + ' v ' + an;
 
    var body = document.getElementById('sheet-body');
    body.innerHTML = '<div class="sbox"><div class="spnr"></div><div>Loading lineup…</div></div>';
 
    openSheet();
 
    // Fetch full event summary for lineup data
    fetchWithFallback(espnEventUrl(eventId)).then(function(data) {
      renderLineup(data, event, hn, an, hl, al, hs, as, body);
    }).catch(function() {
      // Fall back to scoreboard roster data if summary fetch fails
      renderLineup(null, event, hn, an, hl, al, hs, as, body);
    });
  }
 
  function renderLineup(summaryData, event, hn, an, hl, al, hs, as, body) {
    var comp = event.competitions && event.competitions[0];
    var status = getStatus(event);
    var isFT = status === 'ft';
    var isLive = status === 'live';
 
    // Score display
    var scoreHtml = '';
    if (hs !== null && as !== null) {
      scoreHtml = '<div class="sheet-score">' + hs + ' – ' + as + '</div>';
    } else {
      scoreHtml = '<div class="sheet-score pending">vs</div>';
    }
 
    var hImg = hl ? '<img class="sheet-crest" src="'+hl+'" onerror="this.style.display=\'none\'"/>' : '';
    var aImg = al ? '<img class="sheet-crest" src="'+al+'" onerror="this.style.display=\'none\'"/>' : '';
 
    var matchSummary = '<div class="sheet-match">' +
      '<div class="sheet-team">' + hImg + '<div class="sheet-team-name">' + hn + '</div></div>' +
      scoreHtml +
      '<div class="sheet-team">' + aImg + '<div class="sheet-team-name">' + an + '</div></div>' +
    '</div>';
 
    // Try to get rosters from summary data first, then fall back to scoreboard
    var homeRoster = null, awayRoster = null;
    var homeFormation = '', awayFormation = '';
 
    if (summaryData && summaryData.rosters) {
      // ESPN summary endpoint groups roster by team
      summaryData.rosters.forEach(function(r) {
        var homeAway = r.homeAway;
        if (homeAway === 'home') { homeRoster = r; homeFormation = r.formation || ''; }
        if (homeAway === 'away') { awayRoster = r; awayFormation = r.formation || ''; }
      });
    }
 
    // Also check scoreboard comp.rosters
    if (!homeRoster && comp && comp.rosters) {
      comp.rosters.forEach(function(r) {
        if (r.homeAway === 'home') { homeRoster = r; homeFormation = r.formation || ''; }
        if (r.homeAway === 'away') { awayRoster = r; awayFormation = r.formation || ''; }
      });
    }
 
    var homeStarters = [], homeSubs = [], awayStarters = [], awaySubs = [];
 
    if (homeRoster && homeRoster.roster) {
      homeRoster.roster.forEach(function(p) {
        if (p.starter) homeStarters.push(p); else homeSubs.push(p);
      });
    }
    if (awayRoster && awayRoster.roster) {
      awayRoster.roster.forEach(function(p) {
        if (p.starter) awayStarters.push(p); else awaySubs.push(p);
      });
    }
 
    var hasAnyLineup = homeStarters.length > 0 || awayStarters.length > 0;
 
    if (!hasAnyLineup) {
      body.innerHTML = matchSummary +
        '<div class="no-lineup">' +
          '<span class="big">📋</span>' +
          'Lineup not yet confirmed.<br>' +
          '<span style="font-size:12px">Lineups are typically released an hour before kick-off.</span>' +
        '</div>';
      return;
    }
 
    function playerRows(players) {
      return players.map(function(p) {
        var num  = (p.jersey) || '';
        var name = (p.athlete && p.athlete.shortName) || (p.athlete && p.athlete.displayName) || '?';
        var pos  = (p.position && p.position.abbreviation) || '';
        var cap  = p.captain ? '<span class="captain-badge">C</span>' : '';
        return '<div class="player-row">' +
          '<div class="player-num">' + num + '</div>' +
          '<div class="player-name">' + name + cap + '</div>' +
          '<div class="player-pos">' + pos + '</div>' +
        '</div>';
      }).join('');
    }
 
    var homeCol = '<div class="lineup-col">' +
      '<div class="lineup-col-title">' + hn + '</div>' +
      (homeFormation ? '<div class="formation-tag">' + homeFormation + '</div>' : '') +
      playerRows(homeStarters) +
      (homeSubs.length ? '<span class="subs-label">Substitutes</span>' + playerRows(homeSubs) : '') +
    '</div>';
 
    var awayCol = '<div class="lineup-col">' +
      '<div class="lineup-col-title">' + an + '</div>' +
      (awayFormation ? '<div class="formation-tag">' + awayFormation + '</div>' : '') +
      playerRows(awayStarters) +
      (awaySubs.length ? '<span class="subs-label">Substitutes</span>' + playerRows(awaySubs) : '') +
    '</div>';
 
    body.innerHTML = matchSummary +
      '<div class="lineup-cols">' + homeCol + awayCol + '</div>';
  }
 
  function openSheet() {
    document.getElementById('backdrop').classList.add('open');
    document.getElementById('sheet').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
 
  function closeSheet() {
    document.getElementById('backdrop').classList.remove('open');
    document.getElementById('sheet').classList.remove('open');
    document.body.style.overflow = '';
  }
 
  // Swipe down to close
  (function() {
    var sheet = document.getElementById('sheet');
    var startY = 0, isDragging = false;
    sheet.addEventListener('touchstart', function(e) {
      startY = e.touches[0].clientY; isDragging = true;
    }, {passive:true});
    sheet.addEventListener('touchmove', function(e) {
      if (!isDragging) return;
      var dy = e.touches[0].clientY - startY;
      if (dy > 0) sheet.style.transform = 'translateY(' + dy + 'px)';
    }, {passive:true});
    sheet.addEventListener('touchend', function(e) {
      isDragging = false;
      var dy = e.changedTouches[0].clientY - startY;
      if (dy > 80) { closeSheet(); }
      sheet.style.transform = '';
    }, {passive:true});
  })();
 
  load();
  timer = setInterval(load, 60000);
</script>
</body>
